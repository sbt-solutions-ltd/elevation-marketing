name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Needs write access so the gh-pages CLI can push the built site to the
# gh-pages branch (the branch GitHub Pages already serves from).
permissions:
  contents: write

# Don't run two deploys at once; let an in-progress one finish.
concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `nuxt generate` sets NODE_ENV=production, which switches nuxt.config to
      # the /elevation-marketing/ baseURL. Set explicitly too as a safeguard.
      - name: Generate static site
        run: npm run generate
        env:
          NODE_ENV: production

      # Publishes .output/public to the gh-pages branch. The gh-pages CLI clones
      # into its own cache dir, so it needs the token passed in the repo URL
      # (-r) rather than relying on the checkout's persisted credentials.
      # --dotfiles keeps .nojekyll so the _nuxt/ assets are served.
      - name: Publish to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npx gh-pages --dotfiles -d .output/public \
            -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
